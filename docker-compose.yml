services:
  dev:
    build:
      context: .
      target: runtime
      dockerfile: Containerfile
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_DRIVER_CAPABILITIES=all
      - QT_QPA_PLATFORM=xcb
    network_mode: host
    pid: host
    ipc: host
    userns_mode: host
    stdin_open: true
    tty: true
    command: /bin/bash
